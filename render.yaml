services:
  - type: web
    name: nam-findz-api
    runtime: node
    buildCommand: npx pnpm install && npx pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false

 - type: web
    name: nam-findz-frontend
    runtime: static
    buildCommand: npx pnpm install && npx pnpm --filter @workspace/namfindz run build
    staticPublishPath: artifacts/namfindz/dist
    envVars:
      - key: VITE_API_URL
        value: https://nam-findz-api.onrender.com