kind = "web"
previewPath = "/"
title = "namFindz"
version = "1.0.0"
id = "artifacts/namfindz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26249

[services.development]
run = "pnpm --filter @workspace/namfindz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/namfindz", "run", "build" ]
publicDir = "artifacts/namfindz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26249"
BASE_PATH = "/"
